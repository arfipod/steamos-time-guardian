name: Validate notification threshold fix

on:
  push:
    branches:
      - agent/validate-notification-fix
    paths:
      - .github/notification-validation-trigger

permissions:
  contents: write

jobs:
  validate-and-finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-notification-thresholds
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-build-isolation --editable '.[dev]'
          npm install --global typescript@5.8.3
      - name: Apply final threshold edge-case fixes
        id: apply
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path

          engine_path = Path('daemon/src/stg/engine.py')
          engine = engine_path.read_text(encoding='utf-8')
          old_crossed = (
              '        crossed = [threshold for threshold in due_thresholds '
              'if remaining <= threshold < previous_remaining]\n'
          )
          new_crossed = '''        crossed = [
              threshold
              for threshold in due_thresholds
              if remaining < previous_remaining
              and remaining <= threshold <= previous_remaining
          ]
'''
          if old_crossed in engine:
              engine = engine.replace(old_crossed, new_crossed, 1)
          elif new_crossed not in engine:
              raise RuntimeError('unexpected warning crossing expression')

          cleanups = {
              'max(0, int(round(limit - self.played_today)))': 'max(0, round(limit - self.played_today))',
              'max(0, int(round(self.played_today)))': 'max(0, round(self.played_today))',
              '"duration_seconds": int(round(duration)),': '"duration_seconds": round(duration),',
          }
          for old, new in cleanups.items():
              if old in engine:
                  engine = engine.replace(old, new, 1)
              elif new not in engine:
                  raise RuntimeError(f'unexpected engine cleanup occurrence: {old}')
          engine_path.write_text(engine, encoding='utf-8')

          i18n_path = Path('daemon/src/stg/i18n.py')
          i18n = i18n_path.read_text(encoding='utf-8')
          i18n_path.write_text(i18n.replace('1–7', '1-7').replace('0–3', '0-3'), encoding='utf-8')

          test_path = Path('tests/unit/test_warning_transitions.py')
          test = test_path.read_text(encoding='utf-8')
          marker = '''    def test_timer_emits_each_threshold_only_when_crossed(self):
'''
          addition = '''    def test_timer_started_at_a_threshold_waits_until_time_decreases(self):
        self.engine.start_timer(15 * 60)

        self.assertEqual(warnings(self.engine.tick()), [])
        self.clock.advance(1)
        emitted = warnings(self.engine.tick())

        self.assertEqual(
            [event.payload["threshold_seconds"] for event in emitted],
            [15 * 60],
        )
        self.assertEqual(warnings(self.engine.tick()), [])

'''
          if addition not in test:
              if test.count(marker) != 1:
                  raise RuntimeError('unexpected threshold test layout')
              test = test.replace(marker, addition + marker, 1)
          test_path.write_text(test, encoding='utf-8')
          PY
          python -m ruff format \
            daemon/src/stg/engine.py \
            daemon/src/stg/i18n.py \
            tests/unit/test_i18n.py \
            tests/unit/test_warning_transitions.py
      - name: Run complete validation and capture results
        id: validate
        shell: bash
        env:
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        run: |
          mkdir -p /tmp/notification-validation
          summary=/tmp/notification-validation/summary.txt
          : > "$summary"
          ok=true

          record() {
            local name="$1"
            local status="$2"
            printf '%s=%s\n' "$name" "$status" >> "$summary"
            if [[ "$status" != "0" ]]; then
              ok=false
            fi
          }

          run_check() {
            local name="$1"
            shift
            set +e
            "$@" > "/tmp/notification-validation/${name}.log" 2>&1
            local status=$?
            set -e
            record "$name" "$status"
          }

          if [[ "$APPLY_OUTCOME" == "success" ]]; then
            record apply 0
          else
            record apply 1
          fi

          run_check compile python -m compileall -q daemon/src tests
          run_check format python -m ruff format --check \
            daemon/src/stg/engine.py \
            daemon/src/stg/i18n.py \
            tests/unit/test_i18n.py \
            tests/unit/test_warning_transitions.py
          run_check ruff python -m ruff check \
            daemon/src/stg/engine.py \
            daemon/src/stg/i18n.py \
            tests/unit/test_i18n.py \
            tests/unit/test_warning_transitions.py
          run_check diff bash -lc 'git diff --check'

          set +e
          PYTHONPATH=daemon/src python -m mypy daemon/src/stg \
            > /tmp/notification-validation/mypy.log 2>&1
          mypy_status=$?
          set -e
          if grep -Eq '^daemon/src/stg/(engine|i18n)\.py:' /tmp/notification-validation/mypy.log; then
            record mypy_modified_modules 1
          else
            record mypy_modified_modules 0
          fi
          printf 'mypy_repository_baseline=%s\n' "$mypy_status" >> "$summary"

          run_check tests ./scripts/test.sh --coverage
          run_check build ./scripts/build.sh
          rm -rf .mypy_cache .pytest_cache
          run_check integrity python tools/lint_repo.py
          run_check smoke ./scripts/smoke-test.sh
          run_check package ./scripts/package.sh --skip-tests

          printf 'overall=%s\n' "$ok" >> "$summary"
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
      - name: Publish one clean validated commit
        if: steps.validate.outputs.ok == 'true'
        run: |
          mkdir -p /tmp/final-notification-fix
          cp --parents \
            CHANGELOG.md \
            daemon/src/stg/engine.py \
            daemon/src/stg/i18n.py \
            tests/unit/test_i18n.py \
            tests/unit/test_warning_transitions.py \
            /tmp/final-notification-fix/
          git fetch origin main
          git reset --hard origin/main
          git clean -fdx
          cp -a /tmp/final-notification-fix/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            daemon/src/stg/engine.py \
            daemon/src/stg/i18n.py \
            tests/unit/test_i18n.py \
            tests/unit/test_warning_transitions.py
          git commit -m "fix: make warning notifications threshold-based"
          git push --force origin HEAD:agent/fix-notification-thresholds
          git push origin --delete agent/validate-notification-fix
      - name: Publish failure diagnostics
        if: steps.validate.outputs.ok != 'true'
        run: |
          result=/tmp/notification-validation/result.txt
          cp /tmp/notification-validation/summary.txt "$result"
          for exit_file in /tmp/notification-validation/*.log; do
            name=$(basename "$exit_file")
            printf '\n===== %s (last 80 lines) =====\n' "$name" >> "$result"
            tail -n 80 "$exit_file" >> "$result"
          done
          cp "$result" /tmp/notification-validation-result.txt

          git fetch origin agent/validate-notification-fix
          git reset --hard origin/agent/validate-notification-fix
          git clean -fdx
          mkdir -p .github
          cp /tmp/notification-validation-result.txt .github/notification-validation-result.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/notification-validation-result.txt
          git commit -m "chore: record notification validation failure"
          git push origin HEAD:agent/validate-notification-fix
          exit 1
