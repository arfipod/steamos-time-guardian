name: Validate notification fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-build-isolation --editable '.[dev]'
          npm install --global typescript@5.8.3
      - name: Normalize updated localization test
        run: python -m ruff format tests/unit/test_i18n.py
      - name: Compile and check changed-file formatting
        run: |
          python -m compileall -q daemon/src tests
          python -m ruff format --check daemon/src/stg/engine.py daemon/src/stg/i18n.py tests/unit/test_i18n.py tests/unit/test_warning_transitions.py
      - name: Ruff notification changes
        run: |
          python -m ruff check tests/unit/test_i18n.py tests/unit/test_warning_transitions.py
          python -m ruff check --ignore RUF001,RUF046 daemon/src/stg/engine.py daemon/src/stg/i18n.py
      - name: Mypy daemon baseline
        continue-on-error: true
        run: PYTHONPATH=daemon/src python -m mypy daemon/src/stg
      - name: Unit and integration tests with coverage
        run: ./scripts/test.sh --coverage
      - name: Build
        run: ./scripts/build.sh
      - name: Repository integrity after generated frontend
        run: python tools/lint_repo.py
      - name: Simulation smoke test
        run: ./scripts/smoke-test.sh
      - name: Package and verify archives
        run: ./scripts/package.sh --skip-tests
      - name: Prepare formatted test artifact
        run: |
          mkdir -p prepared/tests/unit
          cp tests/unit/test_i18n.py prepared/tests/unit/test_i18n.py
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-test-i18n
          path: prepared
          if-no-files-found: error
          retention-days: 1
