<rect x="38" y="70" width="176" height="315" rx="7" fill="#101418"/><g fill="#9ca3af" font-family="monospace" font-size="16"><text x="58" y="104" fill="#93c5fd">▸ Summary</text><text x="58" y="140">  Timer</text><text x="58" y="176">  Daily limit</text><text x="58" y="212">  Weekly</text><text x="58" y="248">  History</text><text x="58" y="284">  Settings</text><text x="58" y="320">  Diagnostics</text></g>
<text x="240" y="99" fill="#93c5fd" font-family="monospace" font-size="18" font-weight="700">SUMMARY</text><g fill="#d1d5db" font-family="monospace" font-size="15"><text x="240" y="137">Playing today:</text><text x="480" y="137" fill="#fff">01:14:03</text><text x="240" y="169">Remaining today:</text><text x="480" y="169" fill="#86efac">00:45:57</text><text x="240" y="201">Detected:</text><text x="480" y="201" fill="#fff">Example Game (1234)</text><text x="240" y="233">Timer:</text><text x="480" y="233" fill="#fbbf24">running · 00:18:42</text><text x="240" y="265">Next warning:</text><text x="480" y="265" fill="#fff">00:15:00</text><text x="240" y="297">Restriction:</text><text x="480" y="297" fill="#86efac">level 0 / none</text></g><rect x="240" y="330" width="470" height="38" rx="6" fill="#24303a"/><text x="258" y="354" fill="#d1d5db" font-family="monospace" font-size="14">↑↓ views  Enter action  r refresh  q quit</text>
